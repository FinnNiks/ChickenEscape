<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Escape: Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 5;
        }
        #level-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fbbf24;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        #menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            color: white;
            border: 3px solid #fbbf24;
            z-index: 20;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .btn {
            background: #fbbf24;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            border: none;
        }
        .btn:hover:not(:disabled) { background: #f59e0b; transform: scale(1.05); }
        .btn:disabled { background: #4b5563; cursor: not-allowed; opacity: 0.6; }
        
        .skin-card {
            border: 2px solid #374151;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .skin-card.selected { border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .skin-card.locked { opacity: 0.5; cursor: not-allowed; }
        
        .slider {
            width: 100%;
            height: 8px;
            background: #374151;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            border-radius: 50%;
            cursor: pointer;
        }

        .hidden { display: none !important; }
        
        #choice-modal {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            border: 2px solid #22c55e;
            text-align: center;
            color: white;
            z-index: 30;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay">
        <div class="text-2xl font-bold">Score: <span id="scoreDisplay">0</span></div>
        <div class="text-sm opacity-80">High Score: <span id="highScoreDisplay">0</span></div>
    </div>

    <div id="level-indicator">Level 1: Kitchen</div>

    <div id="choice-modal" class="hidden">
        <h2 class="text-2xl font-bold text-green-400 mb-2">MILESTONE REACHED!</h2>
        <p id="choice-text" class="mb-4"></p>
        <div class="flex gap-4 justify-center">
            <div class="btn !bg-gray-600 !text-white" onclick="stayInLevel()">Stay Here</div>
            <div class="btn" id="advance-btn">Go to Next Level</div>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="menu">
        <h1 id="menu-title" class="text-3xl font-black mb-4 text-yellow-400">KITCHEN ESCAPE</h1>
        
        <div id="settings-panel" class="space-y-6">
            <!-- Difficulty -->
            <div class="text-left space-y-4">
                <h3 class="text-sm font-bold uppercase text-gray-400">Difficulty Tuning</h3>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>Chicken Speed</span>
                        <span id="chickenSpeedVal">5.0</span>
                    </div>
                    <input type="range" min="3" max="8" step="0.5" value="5" class="slider" id="chickenSpeedRange">
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>Butcher Base Speed</span>
                        <span id="butcherSpeedVal">2.5</span>
                    </div>
                    <input type="range" min="1" max="5" step="0.5" value="2.5" class="slider" id="butcherSpeedRange">
                </div>
            </div>

            <!-- Skin Selection -->
            <div class="text-left space-y-2">
                <h3 class="text-sm font-bold uppercase text-gray-400">Choose Costume</h3>
                <div class="grid grid-cols-3 gap-2">
                    <div class="skin-card selected" id="skin-default" onclick="selectSkin('default')">
                        <div class="text-[10px] font-bold">DEFAULT</div>
                        <div class="text-2xl">🐔</div>
                    </div>
                    <div class="skin-card locked" id="skin-cat" onclick="selectSkin('cat')">
                        <div class="text-[10px] font-bold">CAT</div>
                        <div class="text-2xl">🐱</div>
                        <div id="lock-cat" class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-md text-xs">🔒</div>
                    </div>
                    <div class="skin-card locked" id="skin-aqua" onclick="selectSkin('aqua')">
                        <div class="text-[10px] font-bold">AQUA</div>
                        <div class="text-2xl">🧜‍♂️</div>
                        <div id="lock-aqua" class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-md text-xs">🔒</div>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-800">
                <button class="btn w-full py-3" onclick="startGame()">Start Running</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const levelIndicator = document.getElementById('level-indicator');
    const menu = document.getElementById('menu');
    const choiceModal = document.getElementById('choice-modal');

    // Persistence & State
    let wins = parseInt(localStorage.getItem('kitchen_escape_wins') || '0');
    let highScore = parseInt(localStorage.getItem('chicken_td_highscore') || '0');
    highScoreDisplay.innerText = highScore;

    let isGameRunning = false;
    let isPaused = false;
    let score = 0;
    let frameCount = 0;
    let currentLevel = 1;
    let hasWonThisSession = false;

    // Config Values
    let selectedSkin = 'default';
    let baseChickenSpeed = 5.5;
    let baseButcherSpeed = 2.5;

    const LEVELS = {
        1: { name: "Kitchen", colorA: "#cbd5e1", colorB: "#f8fafc", threshold: 40 },
        2: { name: "Dining Room", colorA: "#92400e", colorB: "#78350f", threshold: 80 },
        3: { name: "Freezer", colorA: "#bae6fd", colorB: "#7dd3fc", threshold: 130 }
    };

    // UI Listeners
    const chickenSlider = document.getElementById('chickenSpeedRange');
    const butcherSlider = document.getElementById('butcherSpeedRange');
    
    chickenSlider.oninput = function() { 
        baseChickenSpeed = parseFloat(this.value);
        document.getElementById('chickenSpeedVal').innerText = baseChickenSpeed.toFixed(1);
    };
    butcherSlider.oninput = function() { 
        baseButcherSpeed = parseFloat(this.value);
        document.getElementById('butcherSpeedVal').innerText = baseButcherSpeed.toFixed(1);
    };

    function updateSkinUnlocks() {
        if (wins >= 1) {
            document.getElementById('skin-cat').classList.remove('locked');
            document.getElementById('lock-cat').classList.add('hidden');
        }
        if (wins >= 2) {
            document.getElementById('skin-aqua').classList.remove('locked');
            document.getElementById('lock-aqua').classList.add('hidden');
        }
    }
    updateSkinUnlocks();

    function selectSkin(skin) {
        if (skin === 'cat' && wins < 1) return;
        if (skin === 'aqua' && wins < 2) return;
        
        selectedSkin = skin;
        document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('skin-' + skin).classList.add('selected');
    }

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    let chicken = { x: 0, y: 0, radius: 18, speed: 5, angle: 0, boostTimer: 0 };
    let butchers = [];
    let boosters = [];
    let bombs = [];
    let explosions = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if(!isGameRunning) {
            chicken.x = canvas.width / 2;
            chicken.y = canvas.height / 2;
        }
    }
    window.addEventListener('resize', resize);
    resize();

    function drawBackground() {
        const config = LEVELS[currentLevel];
        const tileSize = 60;
        for (let x = 0; x < canvas.width; x += tileSize) {
            for (let y = 0; y < canvas.height; y += tileSize) {
                ctx.fillStyle = ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) ? config.colorA : config.colorB;
                ctx.fillRect(x, y, tileSize, tileSize);
            }
        }
    }

    function drawChicken() {
        ctx.save();
        ctx.translate(chicken.x, chicken.y);
        ctx.rotate(chicken.angle);

        // Movement animation
        const isMoving = keys['arrowup'] || keys['arrowdown'] || keys['arrowleft'] || keys['arrowright'] || keys['w'] || keys['a'] || keys['s'] || keys['d'];
        const walkCycle = isMoving ? Math.sin(frameCount * 0.5) * 10 : 0;

        // Legs
        ctx.strokeStyle = (selectedSkin === 'aqua') ? '#0ea5e9' : '#fbbf24';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -10); ctx.lineTo(-15 + walkCycle, -15);
        ctx.moveTo(0, 10); ctx.lineTo(-15 - walkCycle, 15);
        ctx.stroke();

        if (selectedSkin === 'cat') {
            // CAT SUIT
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.ellipse(0, 0, 22, 16, 0, 0, Math.PI * 2); ctx.fill();
            // Tail
            ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 6; ctx.beginPath();
            ctx.moveTo(-18, 0); ctx.quadraticCurveTo(-30, Math.sin(frameCount*0.1)*10, -35, 0); ctx.stroke();
            // Ears
            ctx.beginPath(); ctx.moveTo(8, -12); ctx.lineTo(15, -20); ctx.lineTo(18, -8);
            ctx.moveTo(8, 12); ctx.lineTo(15, 20); ctx.lineTo(18, 8); ctx.fill();
        } else if (selectedSkin === 'aqua') {
            // AQUA MAN SUIT
            // Scaly Green Body
            ctx.fillStyle = '#166534';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI * 2); ctx.fill();
            // Gold belt/detail
            ctx.strokeStyle = '#eab308'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(0, 15); ctx.stroke();
            // Trident handle on back
            ctx.strokeStyle = '#fde047'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(5, 15); ctx.stroke();
        } else {
            // DEFAULT
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 2; ctx.stroke();
        }

        // CHICKEN HEAD (Signature)
        ctx.fillStyle = '#ef4444';
        ctx.beginPath(); ctx.arc(-10, 0, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = (selectedSkin === 'aqua') ? '#facc15' : '#fbbf24';
        ctx.beginPath(); ctx.moveTo(15, -5); ctx.lineTo(25, 0); ctx.lineTo(15, 5); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(10, -6, 2, 0, Math.PI * 2); ctx.arc(10, 6, 2, 0, Math.PI * 2); ctx.fill();

        if (chicken.boostTimer > 0) {
            ctx.strokeStyle = (selectedSkin === 'aqua') ? 'rgba(14, 165, 233, 0.5)' : 'rgba(34, 197, 94, 0.5)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(0, 0, 25 + Math.sin(frameCount * 0.2) * 5, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.restore();
    }

    // Standard drawing functions
    function drawButcher(b) {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle);
        ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.moveTo(15, 10); ctx.lineTo(35, 10); ctx.lineTo(40, 15); ctx.lineTo(15, 20); ctx.fill();
        ctx.fillStyle = '#451a03'; ctx.fillRect(10, 10, 10, 10);
        ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fde047'; ctx.beginPath(); ctx.arc(5, 0, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-2, 0, 10, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawBooster(b) {
        ctx.save(); ctx.translate(b.x, b.y);
        ctx.fillStyle = (selectedSkin === 'aqua') ? 'rgba(14, 165, 233, 0.3)' : 'rgba(34, 197, 94, 0.3)';
        ctx.beginPath(); ctx.arc(0, 0, b.radius + Math.sin(frameCount * 0.1) * 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = (selectedSkin === 'aqua') ? '#0ea5e9' : '#22c55e';
        ctx.beginPath(); ctx.ellipse(0, 0, b.radius, b.radius * 0.6, Math.PI/4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawBomb(b) {
        ctx.save(); ctx.translate(b.x, b.y);
        if (b.triggered) {
            const flash = Math.sin(frameCount * 0.5) > 0;
            ctx.fillStyle = flash ? 'rgba(239, 68, 68, 0.4)' : 'rgba(239, 68, 68, 0.1)';
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(0, -2, 30, 4);
        if (b.triggered) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, b.radius * 0.6, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
    }

    function drawExplosion(e) {
        const progress = e.timer / e.maxTimer;
        const radius = e.radius * (1 - progress);
        ctx.save();
        ctx.beginPath();
        const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, radius);
        gradient.addColorStop(0, `rgba(251, 191, 36, ${progress})`);
        gradient.addColorStop(0.6, `rgba(239, 68, 68, ${progress})`);
        gradient.addColorStop(1, `rgba(0, 0, 0, 0)`);
        ctx.fillStyle = gradient; ctx.arc(e.x, e.y, radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function spawnButcher() {
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -50 : canvas.width + 50;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -50 : canvas.height + 50;
        }
        let speed = baseButcherSpeed + (currentLevel * 0.5) + (score * 0.02);
        butchers.push({ x, y, radius: 20, speed: Math.min(speed, 7), angle: 0 });
    }

    function update() {
        if (!isGameRunning || isPaused) return;
        frameCount++;

        let dx = 0; let dy = 0;
        if (keys['arrowup'] || keys['w']) dy -= 1;
        if (keys['arrowdown'] || keys['s']) dy += 1;
        if (keys['arrowleft'] || keys['a']) dx -= 1;
        if (keys['arrowright'] || keys['d']) dx += 1;

        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx * dx + dy * dy);
            dx /= length; dy /= length;
            chicken.angle = Math.atan2(dy, dx);
        }

        chicken.speed = (chicken.boostTimer > 0) ? baseChickenSpeed * 1.6 : baseChickenSpeed;
        if (chicken.boostTimer > 0) chicken.boostTimer--;

        chicken.x += dx * chicken.speed;
        chicken.y += dy * chicken.speed;
        chicken.x = Math.max(chicken.radius, Math.min(canvas.width - chicken.radius, chicken.x));
        chicken.y = Math.max(chicken.radius, Math.min(canvas.height - chicken.radius, chicken.y));

        if (frameCount % 60 === 0) {
            score++; scoreDisplay.innerText = score;
            checkLevelProgress();
        }

        let spawnRate = Math.max(15, 100 - (currentLevel * 20) - (score * 0.1));
        if (frameCount % Math.floor(spawnRate) === 0) spawnButcher();
        if (frameCount % 400 === 0) boosters.push({ x: 50+Math.random()*(canvas.width-100), y: 50+Math.random()*(canvas.height-100), radius: 10 });
        if (frameCount % 500 === 0) bombs.push({ x: 50+Math.random()*(canvas.width-100), y: 50+Math.random()*(canvas.height-100), radius: 12, triggered: false, timer: 36 });

        butchers.forEach(b => {
            let bdx = chicken.x - b.x; let bdy = chicken.y - b.y; let dist = Math.sqrt(bdx*bdx + bdy*bdy);
            b.angle = Math.atan2(bdy, bdx);
            if (dist > 0) { b.x += (bdx/dist)*b.speed; b.y += (bdy/dist)*b.speed; }
            if (dist < chicken.radius + b.radius - 5) gameOver();
        });

        boosters.forEach((b, i) => {
            if (Math.sqrt((chicken.x-b.x)**2 + (chicken.y-b.y)**2) < chicken.radius+b.radius) {
                boosters.splice(i, 1); chicken.boostTimer = 180; score += 5; scoreDisplay.innerText = score;
            }
        });

        bombs.forEach((b, i) => {
            if (!b.triggered && Math.sqrt((chicken.x-b.x)**2 + (chicken.y-b.y)**2) < chicken.radius+b.radius) b.triggered = true;
            if (b.triggered) {
                b.timer--;
                if (b.timer <= 0) {
                    explosions.push({ x: b.x, y: b.y, radius: 150, timer: 20, maxTimer: 20 });
                    bombs.splice(i, 1);
                }
            }
        });

        explosions.forEach((e, i) => {
            e.timer--;
            if (Math.sqrt((chicken.x-e.x)**2 + (chicken.y-e.y)**2) < e.radius * 0.6) gameOver();
            for(let j=butchers.length-1; j>=0; j--) {
                if (Math.sqrt((butchers[j].x-e.x)**2 + (butchers[j].y-e.y)**2) < e.radius) {
                    butchers.splice(j, 1); score += 10; scoreDisplay.innerText = score;
                    checkLevelProgress();
                }
            }
            if (e.timer <= 0) explosions.splice(i, 1);
        });
    }

    function checkLevelProgress() {
        if (score >= LEVELS[1].threshold && currentLevel === 1) showChoice(2);
        if (score >= LEVELS[2].threshold && currentLevel === 2) showChoice(3);
        if (score >= LEVELS[3].threshold && !hasWonThisSession) winGame();
    }

    function showChoice(targetLevel) {
        if (isPaused) return;
        isPaused = true;
        choiceModal.classList.remove('hidden');
        document.getElementById('choice-text').innerText = `MILESTONE! Advance to ${LEVELS[targetLevel].name}?`;
        document.getElementById('advance-btn').onclick = () => advanceLevel(targetLevel);
    }

    function advanceLevel(target) {
        currentLevel = target; isPaused = false;
        choiceModal.classList.add('hidden');
        levelIndicator.innerText = `Level ${currentLevel}: ${LEVELS[currentLevel].name}`;
        butchers = butchers.filter(b => Math.sqrt((chicken.x-b.x)**2 + (chicken.y-b.y)**2) > 300);
    }

    function stayInLevel() { isPaused = false; choiceModal.classList.add('hidden'); }

    function winGame() {
        hasWonThisSession = true;
        wins++;
        localStorage.setItem('kitchen_escape_wins', wins);
        updateSkinUnlocks();
        isGameRunning = false;
        menu.classList.remove('hidden');
        document.getElementById('menu-title').innerText = "🏆 MISSION COMPLETE! 🏆";
        document.getElementById('menu-title').className = "text-3xl font-black mb-4 text-green-400";
        // Update menu content to reflect victory
        document.getElementById('settings-panel').innerHTML = `
            <div class="bg-green-900/40 p-4 rounded-lg border border-green-500 mb-4">
                <p class="font-bold">TOTAL SCORE: ${score}</p>
                <p class="text-sm mt-1">Wins Tracked: ${wins}</p>
                ${wins === 1 ? '<p class="text-yellow-400 text-xs mt-2 italic">CAT COSTUME UNLOCKED!</p>' : ''}
                ${wins === 2 ? '<p class="text-blue-400 text-xs mt-2 italic">AQUA CLUCK UNLOCKED!</p>' : ''}
            </div>
            <button class="btn w-full py-3" onclick="location.reload()">Back to Menu</button>
        `;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        boosters.forEach(drawBooster);
        bombs.forEach(drawBomb);
        explosions.forEach(drawExplosion);
        butchers.forEach(drawButcher);
        drawChicken();
    }

    function gameLoop() {
        update(); draw();
        if (isGameRunning) requestAnimationFrame(gameLoop);
    }

    function startGame() {
        score = 0; frameCount = 0; currentLevel = 1; hasWonThisSession = false;
        butchers = []; boosters = []; bombs = []; explosions = [];
        chicken.x = canvas.width / 2; chicken.y = canvas.height / 2;
        chicken.boostTimer = 0;
        scoreDisplay.innerText = score;
        levelIndicator.innerText = `Level 1: Kitchen`;
        isGameRunning = true; isPaused = false;
        menu.classList.add('hidden');
        choiceModal.classList.add('hidden');
        gameLoop();
    }

    function gameOver() {
        isGameRunning = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('chicken_td_highscore', highScore);
            highScoreDisplay.innerText = highScore;
        }
        menu.classList.remove('hidden');
        document.getElementById('menu-title').innerText = "WASTED";
        document.getElementById('menu-title').className = "text-3xl font-black mb-4 text-red-500";
        // Reset settings panel content (to allow retry)
        setTimeout(() => location.reload(), 2000); // Simple reload for clean state
    }
</script>
</body>
</html>
