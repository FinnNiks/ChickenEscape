<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Escape: The Great Cluck-out</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: linear-gradient(to bottom, #2c3e50, #000000);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }
        #menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            color: white;
            border: 2px solid #fbbf24;
        }
        .btn {
            background: #fbbf24;
            color: #000;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: inline-block;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay">
        <div class="text-2xl font-bold">Score: <span id="scoreDisplay">0</span></div>
        <div class="text-sm opacity-80">High Score: <span id="highScoreDisplay">0</span></div>
    </div>

    <div id="menu">
        <h1 class="text-4xl font-black mb-2 text-yellow-400">KITCHEN ESCAPE</h1>
        <p class="mb-4 italic">Don't end up on the menu!</p>
        <div id="menu-content">
            <p class="text-sm mb-4">Use Arrow Keys or WASD to run away from the butchers!<br>Collect green seeds for a speed boost.</p>
            <div class="btn" onclick="startGame()">START RUNNING</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const menu = document.getElementById('menu');
    const menuContent = document.getElementById('menu-content');

    // Game State
    let isGameRunning = false;
    let score = 0;
    let highScore = localStorage.getItem('chicken_td_highscore') || 0;
    highScoreDisplay.innerText = highScore;
    let frameCount = 0;
    
    // Input tracking
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Entities
    let chicken = { x: 0, y: 0, radius: 18, baseSpeed: 5, speed: 5, angle: 0, boostTimer: 0 };
    let butchers = [];
    let boosters = [];

    // Resize Handler - Make it fill the screen for a top-down arena
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if(!isGameRunning) {
            chicken.x = canvas.width / 2;
            chicken.y = canvas.height / 2;
        }
    }
    window.addEventListener('resize', resize);
    resize();

    // Drawing Helpers
    function drawBackground() {
        // Restaurant checkered floor
        const tileSize = 60;
        for (let x = 0; x < canvas.width; x += tileSize) {
            for (let y = 0; y < canvas.height; y += tileSize) {
                ctx.fillStyle = ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) ? '#cbd5e1' : '#f8fafc';
                ctx.fillRect(x, y, tileSize, tileSize);
            }
        }
    }

    function drawChicken() {
        ctx.save();
        ctx.translate(chicken.x, chicken.y);
        ctx.rotate(chicken.angle);

        // Legs (animated)
        if (keys['arrowup'] || keys['arrowdown'] || keys['arrowleft'] || keys['arrowright'] || keys['w'] || keys['a'] || keys['s'] || keys['d']) {
            const walkCycle = Math.sin(frameCount * 0.5) * 10;
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, -10); ctx.lineTo(-15 + walkCycle, -15);
            ctx.moveTo(0, 10); ctx.lineTo(-15 - walkCycle, 15);
            ctx.stroke();
        }

        // Body
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Comb
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(-10, 0, 6, 0, Math.PI * 2);
        ctx.fill();

        // Beak
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(15, -5);
        ctx.lineTo(25, 0);
        ctx.lineTo(15, 5);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(10, -6, 2, 0, Math.PI * 2);
        ctx.arc(10, 6, 2, 0, Math.PI * 2);
        ctx.fill();

        // Boost Aura
        if (chicken.boostTimer > 0) {
            ctx.strokeStyle = 'rgba(34, 197, 94, 0.5)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, 25 + Math.sin(frameCount * 0.2) * 5, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.restore();
    }

    function drawButcher(b) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.angle);

        // Knife
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath();
        ctx.moveTo(15, 10);
        ctx.lineTo(35, 10);
        ctx.lineTo(40, 15);
        ctx.lineTo(15, 20);
        ctx.fill();
        // Handle
        ctx.fillStyle = '#451a03';
        ctx.fillRect(10, 10, 10, 10);

        // Body
        ctx.fillStyle = '#ef4444'; // Red apron
        ctx.beginPath();
        ctx.arc(0, 0, b.radius, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = '#fde047';
        ctx.beginPath();
        ctx.arc(5, 0, 12, 0, Math.PI * 2);
        ctx.fill();

        // Chef hat
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-2, 0, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawBooster(b) {
        ctx.save();
        ctx.translate(b.x, b.y);
        
        // Glow
        ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, b.radius + Math.sin(frameCount * 0.1) * 3, 0, Math.PI * 2);
        ctx.fill();

        // Seed
        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.ellipse(0, 0, b.radius, b.radius * 0.6, Math.PI/4, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function spawnButcher() {
        // Spawn outside the screen limits so they walk in
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -50 : canvas.width + 50;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -50 : canvas.height + 50;
        }

        // Speed scales up gradually with the survival score
        let baseEnemySpeed = 2.5 + (score * 0.05);
        
        butchers.push({
            x: x,
            y: y,
            radius: 20,
            speed: Math.min(baseEnemySpeed, 4.5), // Cap maximum speed
            angle: 0
        });
    }

    function spawnBooster() {
        boosters.push({
            x: 50 + Math.random() * (canvas.width - 100),
            y: 50 + Math.random() * (canvas.height - 100),
            radius: 10
        });
    }

    function update() {
        if (!isGameRunning) return;
        frameCount++;

        // Chicken Movement based on Input Map
        let dx = 0; let dy = 0;
        if (keys['arrowup'] || keys['w']) dy -= 1;
        if (keys['arrowdown'] || keys['s']) dy += 1;
        if (keys['arrowleft'] || keys['a']) dx -= 1;
        if (keys['arrowright'] || keys['d']) dx += 1;

        if (dx !== 0 || dy !== 0) {
            // Normalize to prevent faster diagonal movement
            const length = Math.sqrt(dx * dx + dy * dy);
            dx /= length;
            dy /= length;
            chicken.angle = Math.atan2(dy, dx);
        }

        // Apply Speed Boost effect
        if (chicken.boostTimer > 0) {
            chicken.boostTimer--;
            chicken.speed = chicken.baseSpeed * 1.6;
        } else {
            chicken.speed = chicken.baseSpeed;
        }

        chicken.x += dx * chicken.speed;
        chicken.y += dy * chicken.speed;

        // Constrain chicken within screen boundaries
        chicken.x = Math.max(chicken.radius, Math.min(canvas.width - chicken.radius, chicken.x));
        chicken.y = Math.max(chicken.radius, Math.min(canvas.height - chicken.radius, chicken.y));

        // Score logic: increment automatically as you survive
        if (frameCount % 60 === 0) {
            score++;
            scoreDisplay.innerText = score;
        }

        // Spawning logic (gets harder as score increases)
        let spawnRate = Math.max(30, 120 - score);
        if (frameCount % spawnRate === 0) spawnButcher();
        
        if (frameCount % 300 === 0) spawnBooster(); // About every 5 seconds

        // Update Butchers & check collisions
        for (let i = butchers.length - 1; i >= 0; i--) {
            let b = butchers[i];
            
            // Vector calculation to move towards chicken
            let bdx = chicken.x - b.x;
            let bdy = chicken.y - b.y;
            let dist = Math.sqrt(bdx * bdx + bdy * bdy);
            
            b.angle = Math.atan2(bdy, bdx);
            if (dist > 0) {
                b.x += (bdx / dist) * b.speed;
                b.y += (bdy / dist) * b.speed;
            }

            // Game Over Collision
            if (dist < chicken.radius + b.radius - 5) {
                gameOver();
            }
        }

        // Update Boosters & check collection
        for (let i = boosters.length - 1; i >= 0; i--) {
            let b = boosters[i];
            let bdx = chicken.x - b.x;
            let bdy = chicken.y - b.y;
            let dist = Math.sqrt(bdx * bdx + bdy * bdy);

            if (dist < chicken.radius + b.radius) {
                boosters.splice(i, 1);
                chicken.boostTimer = 180; // 3 seconds of speed boost
                score += 5; // Extra points for collecting
                scoreDisplay.innerText = score;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        boosters.forEach(drawBooster);
        butchers.forEach(drawButcher);
        drawChicken();
    }

    function gameLoop() {
        update();
        draw();
        if (isGameRunning) {
            requestAnimationFrame(gameLoop);
        }
    }

    function startGame() {
        score = 0;
        frameCount = 0;
        butchers = [];
        boosters = [];
        chicken.x = canvas.width / 2;
        chicken.y = canvas.height / 2;
        chicken.boostTimer = 0;
        scoreDisplay.innerText = score;
        isGameRunning = true;
        menu.classList.add('hidden');
        gameLoop();
    }

    function gameOver() {
        isGameRunning = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('chicken_td_highscore', highScore);
            highScoreDisplay.innerText = highScore;
        }
        
        menu.classList.remove('hidden');
        menuContent.innerHTML = `
            <p class="text-xl mb-2 text-red-500 font-bold">CAUGHT!</p>
            <p class="mb-4 text-white">Score: ${score}</p>
            <p class="text-sm mb-4 text-gray-300">Use Arrow Keys or WASD to run away.<br>Collect green seeds for a speed boost.</p>
            <div class="btn" onclick="startGame()">PLAY AGAIN</div>
        `;
    }

    // Add hidden class helper
    const style = document.createElement('style');
    style.innerHTML = '.hidden { display: none !important; }';
    document.head.appendChild(style);

</script>
</body>
</html>
